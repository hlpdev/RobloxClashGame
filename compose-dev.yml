services:
 
  server:
    build: .
    stop_grace_period: 30s
    ports:
      - "8080:8080"
    depends_on:
      - postgres
      - redis
    env_file: .env
    networks:
      - backend

  postgres:
    image: postgres:17
    env_file: .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend

  redis:
    image: redis:7-alpine
    command: redis-server --notify-keyspace-events Ex
    volumes:
      - redis_data:/data
    networks:
      - backend

  pgadmin:
    image: dpage/pgadmin4:latest
    env_file: .env
    ports:
      - "8082:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - backend
    depends_on:
      - postgres

  redisinsight:
    image: redis/redisinsight:latest
    ports:
      - "8083:5540"
    volumes:
      - redisinsight_data:/data
    networks:
      - backend
    depends_on:
      - redis

  ngrok:
    image: ngrok/ngrok:latest
    command: http --url=${NGROK_DOMAIN} server:8080
    env_file: .env
    ports:
      - "4040:4040"
    networks:
      - backend
    depends_on:
      - server

volumes:
  postgres_data:
  redis_data:
  pgadmin_data:
  redisinsight_data:

networks:
  backend:
    driver: bridge
